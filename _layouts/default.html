<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    <a class="skip-link" href="#main-content">跳到正文</a>

    {%- include header.html -%}

    <main id="main-content" class="page-content" aria-label="正文" tabindex="-1">
      <div class="wrapper">
        <div class="content-wrapper{% if page.sidebar == false %} content-wrapper--wide{% endif %}">
          <div class="main-content">
            {{ content }}
          </div>
          {%- unless page.sidebar == false -%}
          <div class="sidebar-wrapper">
            {%- include sidebar.html -%}
          </div>
          {%- endunless -%}
        </div>
      </div>
    </main>

    {%- include footer.html -%}

    <div id="site-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>

</html>

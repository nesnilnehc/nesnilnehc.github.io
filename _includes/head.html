<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <link rel="icon" href="{{ site.data.site.default_share_image | relative_url }}" type="image/jpeg">
  {%- feed_meta -%}
  {%- assign share_image = page.cover_image | default: site.data.site.default_share_image -%}
  <meta property="og:image" content="{{ share_image | absolute_url }}">
  <meta name="twitter:image" content="{{ share_image | absolute_url }}">
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

</head>

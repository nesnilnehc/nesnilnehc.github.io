name: Build and deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".ruby-version"
      - "404.html"
      - "CNAME"
      - "Gemfile"
      - "Gemfile.lock"
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_posts/**"
      - "_sass/**"
      - "assets/**"
      - "feed.xml"
      - "script/**"
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".ruby-version"
      - "404.html"
      - "CNAME"
      - "Gemfile"
      - "Gemfile.lock"
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_posts/**"
      - "_sass/**"
      - "assets/**"
      - "feed.xml"
      - "script/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: |
          ruby script/validate_content.rb
          bundle exec jekyll build --trace

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy Pages
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
